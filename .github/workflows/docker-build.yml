name: Build and Push Docker Image

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: qqbot-hf:latest

      - name: Package Docker image
        run: |
          mkdir -p package
          docker save qqbot-hf:latest | gzip > package/qqbot-hf-image.tar.gz

      - name: Upload Docker package
        uses: actions/upload-artifact@v4
        with:
          name: qqbot-hf-docker-image
          path: package/qqbot-hf-image.tar.gz
          if-no-files-found: error

      - name: Login to Docker Hub
        if: ${{ env.DOCKERHUB_USERNAME != '' && github.event_name == 'push' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}

      - name: Push to Docker Hub
        if: ${{ env.DOCKERHUB_USERNAME != '' && github.event_name == 'push' }}
        run: |
          docker tag qqbot-hf:latest "${DOCKERHUB_USERNAME}/qqbot-hf:latest"
          docker push "${DOCKERHUB_USERNAME}/qqbot-hf:latest"
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
